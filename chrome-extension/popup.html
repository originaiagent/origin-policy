<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <title>Origin Policy Gate</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header>
      <h1>Origin Policy Gate</h1>
      <label class="toggle">
        <input type="checkbox" id="enabled" />
        <span id="enabled-label">ON</span>
      </label>
    </header>

    <section class="actions">
      <button type="button" id="copy-log">違反ログをコピー</button>
      <button type="button" id="clear-log">ログクリア</button>
    </section>

    <section class="log">
      <h2>直近 50 件の検出ログ</h2>
      <div id="log-list" aria-live="polite">読み込み中…</div>
    </section>

    <footer>
      <p>
        正本: <code>rules/tier0_detectors.yaml</code> ／
        生成: <code>scripts/build_detectors.js</code>
      </p>
    </footer>

    <script src="popup.js"></script>
  </body>
</html>
