# 拡張ローカル補完ルール
# 正本は ../rules/tier0_detectors.yaml（変更不可）
# このファイルは build_detectors.js が正本にマージして detectors.generated.js を出力する。
# 将来的に正本へ統合する際は、この local_rules.yaml の項目を tier0_detectors.yaml に移し、
# このファイルを空にするか削除する。

version: 1

# 爆速モード違反語の追加分（INSTRUCTION の required_checks「爆速モード違反語」テスト対応）
extra_bakuso_violation_words:
  description: |
    tier0_detectors.yaml の r1_question_detection.trigger_patterns.temptation_word に
    含まれない、爆速モード違反として警告したいワード。
  patterns:
    - id: extra_bakuso_word
      regex: '(区切り良いので|区切りいいので|お疲れ様|おつかれさま|おつかれ様)'
      severity: warn
      message: 爆速モード違反語の可能性。即 GO 判定 4 項目に戻る。
