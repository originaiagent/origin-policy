name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run pytest
        run: pytest -v

      - name: Set up Node (for chrome-extension tests)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Regenerate detectors.generated.js (verify build is reproducible)
        run: node chrome-extension/scripts/build_detectors.js

      - name: Validate manifest.json
        run: python -c "import json; json.load(open('chrome-extension/manifest.json'))"

      - name: Run chrome-extension detection tests
        run: node chrome-extension/tests/test_detection.js
